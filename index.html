<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>3D Экскурсия Babylon.js</title>
  <!-- Подключаем официальное ядро и загрузчик Babylon.js -->
  <script src="https://babylonjs.com"></script>
  <script src="https://babylonjs.com"></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f5f5f5; }
    canvas { width: 100%; height: 100%; display: block; outline: none; }
  </style>
</head>
<body>

  <!-- Полотно, на котором движок нарисует вашу 3D модель -->
  <canvas id="renderCanvas"></canvas>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true);

    // Массив координат (куда лететь камере при нажатии цифр 1-5)
    // Вы можете менять эти цифры (X, Y, Z), чтобы настроить идеальные ракурсы
    const viewpoints = {
      "1": { target: new BABYLON.Vector3(-34.94, 12.45, 47.15), alpha: -Math.PI / 4, beta: Math.PI / 3, radius: 10 },
      "2": { target: new BABYLON.Vector3(-25.53, 9.66, 33.76),  alpha: Math.PI / 6,  beta: Math.PI / 4, radius: 15 },
      "3": { target: new BABYLON.Vector3(-5.56, 9.02, 47.12),   alpha: Math.PI / 2,  beta: Math.PI / 3, radius: 12 },
      "4": { target: new BABYLON.Vector3(-5.36, 8.77, 11.18),   alpha: Math.PI / 1.5,beta: Math.PI / 2.5,radius: 8 },
      "5": { target: new BABYLON.Vector3(-2.30, 7.14, -1.76),   alpha: 0,            beta: Math.PI / 4, radius: 20 }
    };

    const createScene = function () {
      const scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0.95, 0.95, 0.95, 1);

      // Создаем интерактивную камеру
      const camera = new BABYLON.ArcRotateCamera("camera", 0, Math.PI / 3, 30, BABYLON.Vector3.Zero(), scene);
      camera.attachControl(canvas, true);
      camera.wheelPrecision = 50; // Скорость зума кулесиком

      // Добавляем автоматическое сглаживание перелетов
      camera.useAutoRotationBehavior = false;
      camera.useBouncingBehavior = true;

      // Настраиваем базовый свет, чтобы модель не была темной
      const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
      light.intensity = 1.2;

      // ЗАГРУЗКА ВАШЕЙ МОДЕЛИ напрямую с сайта без прокси
      BABYLON.SceneLoader.Append("", "default.glb", scene, function (scene) {
        // Как только модель загрузилась, автоматически фокусируем камеру в центр
        if(scene.meshes.length > 0) {
          camera.setTarget(BABYLON.Vector3.Zero());
        }
      });

      // Функция плавного полета камеры в заданную точку
      window.smoothMoveCamera = function(point) {
        // Плавная анимация фокуса (Target)
        BABYLON.Animation.CreateAndStartAnimation("moveTarget", camera, "target", 60, 45, camera.target, point.target, 0, new BABYLON.CubicEase());
        // Плавная анимация углов обзора и дистанции
        BABYLON.Animation.CreateAndStartAnimation("moveAlpha", camera, "alpha", 60, 45, camera.alpha, point.alpha, 0, new BABYLON.CubicEase());
        BABYLON.Animation.CreateAndStartAnimation("moveBeta", camera, "beta", 60, 45, camera.beta, point.beta, 0, new BABYLON.CubicEase());
        BABYLON.Animation.CreateAndStartAnimation("moveRadius", camera, "radius", 60, 45, camera.radius, point.radius, 0, new BABYLON.CubicEase());
      };

      return scene;
    };

    const scene = createScene();

    // Запуск постоянного рендеринга 3D сцены
    engine.runRenderLoop(function () {
      scene.render();
    });

    // Отслеживание изменения размеров окна браузера
    window.addEventListener("resize", function () {
      engine.resize();
    });

    // СЛУШАЕМ НАЖАТИЕ КЛАВИШ 1, 2, 3, 4, 5
    window.addEventListener("keydown", (event) => {
      if (viewpoints[event.key]) {
        window.smoothMoveCamera(viewpoints[event.key]);
      }
    });
  </script>
</body>
</html>
